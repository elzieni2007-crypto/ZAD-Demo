<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام إدارة الشحنات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{
  --navy:#111a4a;
  --navy-2:#1b2a72;
  --primary:#2952e3;
  --primary-light:#eef1fd;
  --bg:#f3f5fa;
  --card:#ffffff;
  --border:#e6e9f2;
  --text:#1f2436;
  --muted:#8890a6;
  --green:#16a34a;
  --green-bg:#e8f8ee;
  --amber:#e08a00;
  --amber-bg:#fdf1de;
  --red:#e6473f;
  --red-bg:#fdeceb;
  --blue:#2b6ff0;
  --blue-bg:#e9f0fe;
  --purple:#7c5cf0;
  --purple-bg:#efe9fe;
  --radius:14px;
  --shadow:0 2px 10px rgba(20,30,80,.06);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Cairo',sans-serif;
  background:var(--bg);
  color:var(--text);
  direction:rtl;
  -webkit-font-smoothing:antialiased;
}
#app{min-height:100vh;}
a{text-decoration:none;color:inherit;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}

/* ---------- LOGIN ---------- */
.login-wrap{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 20% 20%, #1b2a72 0%, #111a4a 60%, #0b1236 100%);
  padding:20px;
}
.login-box{
  background:var(--card);
  border-radius:20px;
  width:100%;max-width:400px;
  padding:36px 32px;
  box-shadow:0 20px 60px rgba(0,0,0,.35);
}
.login-logo{
  width:52px;height:52px;border-radius:14px;
  background:linear-gradient(135deg,var(--primary),#5b7bf5);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:800;font-size:22px;margin:0 auto 14px;
}
.login-title{text-align:center;font-weight:800;font-size:20px;margin-bottom:4px;}
.login-sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:24px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:13px;font-weight:600;color:#4b5168;margin-bottom:6px;}
.field input,.field select,.field textarea{
  width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;
  font-size:14px;background:#fbfbfe;transition:.15s;outline:none;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--primary);background:#fff;}
.btn{
  border:none;border-radius:10px;padding:11px 18px;font-weight:700;font-size:14px;
  display:inline-flex;align-items:center;gap:6px;justify-content:center;transition:.15s;
}
.btn-primary{background:var(--primary);color:#fff;width:100%;padding:13px;}
.btn-primary:hover{background:#1f40c4;}
.btn-outline{background:#fff;border:1.5px solid var(--border);color:var(--text);}
.btn-outline:hover{border-color:var(--primary);color:var(--primary);}
.btn-ghost{background:transparent;color:var(--muted);}
.btn-danger-ghost{background:var(--red-bg);color:var(--red);}
.btn-sm{padding:7px 12px;font-size:12.5px;border-radius:8px;}
.error-msg{background:var(--red-bg);color:var(--red);padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:14px;}
.demo-box{margin-top:20px;background:#f7f8fc;border:1px dashed var(--border);border-radius:12px;padding:12px 14px;font-size:12px;color:var(--muted);}
.demo-box b{color:var(--text);}
.demo-row{display:flex;justify-content:space-between;margin-top:4px;cursor:pointer;padding:4px 6px;border-radius:6px;}
.demo-row:hover{background:#eef1fd;color:var(--primary);}

/* ---------- LAYOUT ---------- */
.layout{display:flex;min-height:100vh;}
.sidebar{
  width:230px;flex-shrink:0;background:linear-gradient(180deg,var(--navy-2),var(--navy));
  color:#c7cdf0;display:flex;flex-direction:column;padding:18px 14px;position:sticky;top:0;height:100vh;overflow-y:auto;
}
.side-logo{display:flex;align-items:center;gap:10px;color:#fff;font-weight:800;font-size:15px;padding:6px 8px 20px;}
.side-logo .dot{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#5b7bf5,#2952e3);display:flex;align-items:center;justify-content:center;font-size:15px;}
.side-section-label{font-size:11px;color:#7f88b8;margin:14px 10px 6px;font-weight:700;letter-spacing:.5px;}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;font-size:13.5px;
  font-weight:600;color:#c7cdf0;margin-bottom:2px;transition:.15s;
}
.nav-item .ic{font-size:16px;width:18px;text-align:center;}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff;}
.nav-item.active{background:#fff;color:var(--navy);}
.sidebar-foot{margin-top:auto;padding-top:12px;border-top:1px solid rgba(255,255,255,.08);}

.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{
  background:#fff;border-bottom:1px solid var(--border);padding:14px 26px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:5;
}
.topbar-title{font-weight:800;font-size:17px;}
.topbar-crumb{font-size:12px;color:var(--muted);margin-top:2px;}
.user-chip{display:flex;align-items:center;gap:10px;}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--primary-light);color:var(--primary);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;}
.user-chip-name{font-weight:700;font-size:13px;}
.user-chip-role{font-size:11px;color:var(--muted);}
.content{padding:22px 26px;flex:1;}

/* ---------- CARDS / GRID ---------- */
.grid{display:grid;gap:16px;}
.grid-4{grid-template-columns:repeat(4,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-2{grid-template-columns:repeat(2,1fr);}
@media(max-width:1100px){.grid-4{grid-template-columns:repeat(2,1fr);}.grid-3{grid-template-columns:repeat(2,1fr);}}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);}
.card-pad{padding:18px 20px;}
.stat-card{display:flex;align-items:center;gap:14px;}
.stat-ic{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;}
.stat-val{font-size:22px;font-weight:800;line-height:1.1;}
.stat-label{font-size:12.5px;color:var(--muted);margin-top:3px;}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);}
.card-head h3{margin:0;font-size:15px;font-weight:800;}

/* ---------- TABLE ---------- */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13.5px;}
th{background:#f8f9fc;color:var(--muted);font-weight:700;text-align:right;padding:11px 14px;white-space:nowrap;font-size:12.5px;}
td{padding:12px 14px;border-top:1px solid var(--border);white-space:nowrap;}
tr:hover td{background:#fafbff;}
.pill{display:inline-block;padding:4px 11px;border-radius:20px;font-size:11.5px;font-weight:700;}
.icon-btn{background:none;border:none;color:var(--muted);font-size:14px;padding:5px 7px;border-radius:6px;}
.icon-btn:hover{background:var(--primary-light);color:var(--primary);}
.empty-state{text-align:center;padding:50px 20px;color:var(--muted);}
.empty-state .big{font-size:36px;margin-bottom:10px;}

/* ---------- FORMS ---------- */
.form-section-title{font-weight:800;font-size:14px;margin:0 0 14px;padding-bottom:10px;border-bottom:1px solid var(--border);color:var(--navy-2);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 16px;}
@media(max-width:800px){.form-grid{grid-template-columns:1fr;}}
.chips{display:flex;gap:8px;flex-wrap:wrap;}
.chip-opt{padding:8px 14px;border:1.5px solid var(--border);border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;}
.chip-opt.sel{border-color:var(--primary);background:var(--primary-light);color:var(--primary);}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px;}
.toolbar input,.toolbar select{padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:13px;background:#fff;}
.search-input{flex:1;min-width:200px;}
.pagination{display:flex;gap:6px;justify-content:center;padding:16px;align-items:center;}
.page-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:#fff;font-size:12.5px;font-weight:700;color:var(--muted);}
.page-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}

/* ---------- TIMELINE ---------- */
.timeline{position:relative;padding-right:6px;}
.tl-item{display:flex;gap:14px;padding-bottom:22px;position:relative;}
.tl-item:last-child{padding-bottom:0;}
.tl-item::before{content:'';position:absolute;right:17px;top:36px;bottom:0;width:2px;background:var(--border);}
.tl-item:last-child::before{display:none;}
.tl-dot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;z-index:1;}
.tl-title{font-weight:700;font-size:13.5px;}
.tl-date{font-size:12px;color:var(--muted);margin-top:2px;}
.tl-note{font-size:12px;color:var(--muted);margin-top:3px;}

/* ---------- MISC ---------- */
.modal-overlay{position:fixed;inset:0;background:rgba(15,20,50,.5);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
.modal-box{background:#fff;border-radius:16px;max-width:440px;width:100%;padding:26px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:12px 22px;border-radius:10px;font-size:13.5px;font-weight:600;z-index:100;box-shadow:0 10px 30px rgba(0,0,0,.25);}
.badge-num{background:var(--red);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;font-weight:700;}
.two-col{display:grid;grid-template-columns:1.5fr 1fr;gap:16px;}
@media(max-width:1000px){.two-col{grid-template-columns:1fr;}}
.link-btn{color:var(--primary);font-weight:700;font-size:13px;}
.progress-track{height:8px;background:var(--border);border-radius:6px;overflow:hidden;}
.progress-fill{height:100%;background:var(--primary);border-radius:6px;}
.divider{height:1px;background:var(--border);margin:16px 0;}
.mb-0{margin-bottom:0!important;}
.flex-between{display:flex;align-items:center;justify-content:space-between;}
.text-muted{color:var(--muted);}
.small{font-size:12px;}
.mono{font-family:monospace;}


/* ===== Mobile + Smart Dashboard V3 safe patch ===== */
.mobile-menu-btn,.mobile-overlay{display:none;}
.hero-dashboard{background:linear-gradient(135deg,var(--navy-2),var(--primary));color:#fff;border-radius:22px;padding:22px;display:grid;grid-template-columns:1.2fr 1fr;gap:18px;margin-bottom:16px;box-shadow:0 18px 45px rgba(17,26,74,.22);overflow:hidden;position:relative;}
.hero-dashboard:before{content:'';position:absolute;inset:auto -70px -90px auto;width:240px;height:240px;border-radius:50%;background:rgba(255,255,255,.09)}
.hero-kicker{font-size:12px;font-weight:800;opacity:.8;margin-bottom:6px;}
.hero-title{font-size:24px;font-weight:900;line-height:1.45;margin-bottom:6px;}
.hero-sub{font-size:13px;opacity:.82;max-width:620px;}
.hero-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;}
.hero-actions .btn{background:#fff;color:var(--navy);width:auto;}
.hero-actions .btn.secondary{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.24);}
.hero-metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;position:relative;z-index:1;}
.hero-metric{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.16);border-radius:16px;padding:14px;backdrop-filter:blur(4px);}
.hero-metric .num{font-size:21px;font-weight:900;line-height:1.3;}
.hero-metric .lbl{font-size:12px;opacity:.82;}
.insight-list{display:grid;gap:10px;}
.insight-item{display:flex;gap:10px;align-items:flex-start;background:#fbfcff;border:1px solid var(--border);border-radius:14px;padding:11px;}
.insight-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.insight-title{font-size:13px;font-weight:800;}
.insight-note{font-size:12px;color:var(--muted);margin-top:2px;}
.rep-map{height:240px;border-radius:16px;background:linear-gradient(135deg,#eef1fd,#f8fafc);border:1px solid var(--border);position:relative;overflow:hidden;}
.rep-map:before{content:'';position:absolute;inset:18px;border:1px dashed #cbd5e1;border-radius:18px;}
.rep-pin{position:absolute;transform:translate(-50%,-50%);background:#fff;border:2px solid var(--primary);color:var(--primary);box-shadow:0 8px 20px rgba(41,82,227,.18);border-radius:999px;padding:5px 9px;font-size:11px;font-weight:800;white-space:nowrap;}
.rep-pin:after{content:'';position:absolute;left:50%;bottom:-7px;transform:translateX(-50%);border:7px solid transparent;border-top-color:var(--primary);}
.smart-filters{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;}
.smart-filters input,.smart-filters select{width:100%;padding:10px 11px;border:1.5px solid var(--border);border-radius:10px;background:#fff;font-size:12.5px;}
.score-ring{width:98px;height:98px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--green) calc(var(--score)*1%), #e6e9f2 0);margin:auto;}
.score-ring span{background:#fff;border-radius:50%;width:74px;height:74px;display:grid;place-items:center;font-weight:900;color:var(--green);}
@media(max-width:900px){
  .layout{display:block;}
  .sidebar{position:fixed;right:0;top:0;bottom:0;height:100vh;width:280px;z-index:80;transform:translateX(105%);transition:.22s ease;box-shadow:-20px 0 40px rgba(0,0,0,.20);}
  body.mobile-nav-open .sidebar{transform:translateX(0);}
  .mobile-overlay{display:block;position:fixed;inset:0;background:rgba(10,15,45,.45);z-index:70;opacity:0;pointer-events:none;transition:.2s;}
  body.mobile-nav-open .mobile-overlay{opacity:1;pointer-events:auto;}
  .main{min-height:100vh;}
  .topbar{padding:12px 14px;gap:10px;}
  .mobile-menu-btn{display:inline-flex;border:none;border-radius:10px;background:var(--primary-light);color:var(--primary);font-size:20px;width:40px;height:40px;align-items:center;justify-content:center;}
  .topbar-title{font-size:15px;}.topbar-crumb{display:none;}.user-chip-name{font-size:12px}.user-chip-role{display:none}.avatar{width:32px;height:32px;}
  .content{padding:14px;}
  .grid-4,.grid-3,.grid-2,.two-col,.form-grid,.hero-dashboard,.hero-metrics,.smart-filters{grid-template-columns:1fr!important;}
  .hero-dashboard{padding:18px;border-radius:18px}.hero-title{font-size:20px}.hero-actions .btn{width:100%;}
  .card-pad{padding:15px;}.card-head{padding:14px 15px;}.stat-card{align-items:flex-start}.stat-val{font-size:19px;}
  .toolbar{display:grid;grid-template-columns:1fr;}.search-input{min-width:0;width:100%;}.toolbar input,.toolbar select,.toolbar .btn{width:100%;}
  .btn{width:100%;}.btn-sm{padding:10px 12px;}
  .table-wrap{overflow:visible;}
  table,thead,tbody,tr,th,td{display:block;width:100%;}
  thead{display:none;}
  tr{background:#fff;border:1px solid var(--border);border-radius:14px;margin:10px;padding:8px;box-shadow:var(--shadow);}
  td{border:none!important;white-space:normal;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:8px 6px!important;text-align:left;}
  td:before{content:attr(data-label);font-weight:800;color:var(--muted);font-size:12px;text-align:right;}
  td .pill{white-space:nowrap;}
  .pagination{flex-wrap:wrap;}
}

</style>
</head>
<body>
<div id="app"></div>
<script>
/* ============ نظام إدارة الشحنات - طبقة البيانات ============ */
const DB = {
  users:'ship_users_v1', clients:'ship_clients_v1', reps:'ship_reps_v1',
  shipments:'ship_shipments_v1', session:'ship_session_v1', seeded:'ship_seeded_v1', counter:'ship_counter_v1'
};

function load(key, fallback){ try{ const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }catch(e){ return fallback; } }
function save(key, val){ localStorage.setItem(key, JSON.stringify(val)); }

const GOVS = ['القاهرة','الجيزة','الإسكندرية','الشرقية','الدقهلية','القليوبية','المنوفية','البحيرة','أسيوط','سوهاج','الفيوم'];
const SHIP_TYPES = ['عادية','سريعة','تبديل','استرجاع'];

const STATUS_META = {
  'قيد المراجعة': {color:'#8890a6', bg:'#eef0f5', icon:'📝'},
  'في مخزن الشحن': {color:'#2b6ff0', bg:'#e9f0fe', icon:'🏬'},
  'في الشحن': {color:'#7c5cf0', bg:'#efe9fe', icon:'🚚'},
  'تم التسليم': {color:'#16a34a', bg:'#e8f8ee', icon:'✅'},
  'مؤجل': {color:'#e08a00', bg:'#fdf1de', icon:'⏱️'},
  'ملغي': {color:'#e6473f', bg:'#fdeceb', icon:'✖️'},
  'مرتجع': {color:'#e6473f', bg:'#fdeceb', icon:'↩️'},
  'تم استلام المرتجع': {color:'#2b6ff0', bg:'#e9f0fe', icon:'📥'},
  'في مخزن المرتجعات': {color:'#e08a00', bg:'#fdf1de', icon:'🏚️'},
  'في الشحن للمرسل': {color:'#7c5cf0', bg:'#efe9fe', icon:'📤'},
};
const STATUS_LIST = Object.keys(STATUS_META);

function nextShipmentId(){
  let c = load(DB.counter, 100000);
  c += 1;
  save(DB.counter, c);
  return String(c);
}

function fmtMoney(n){ return (Number(n)||0).toLocaleString('ar-EG') + ' ج.م'; }
function fmtDate(d){
  const dt = new Date(d);
  return dt.toLocaleDateString('ar-EG', {year:'numeric', month:'short', day:'numeric'});
}
function fmtDateTime(d){
  const dt = new Date(d);
  return dt.toLocaleDateString('ar-EG', {year:'numeric', month:'short', day:'numeric'}) + ' - ' + dt.toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'});
}
function uid(prefix){ return prefix + Math.random().toString(36).slice(2,9); }
function initials(name){ return (name||'?').trim().split(' ').slice(0,2).map(w=>w[0]).join(''); }

/* ---------- Seed demo data ---------- */
function seedData(){
  if(load(DB.seeded, false)) return;

  const reps = [
    {id:'r1', name:'محمد علي', phone:'01001234567', governorate:'القاهرة', status:'نشط'},
    {id:'r2', name:'سارة أحمد', phone:'01012345678', governorate:'الجيزة', status:'نشط'},
    {id:'r3', name:'يوسف خالد', phone:'01098765432', governorate:'الإسكندرية', status:'نشط'},
    {id:'r4', name:'ليلى إبراهيم', phone:'01111223344', governorate:'الدقهلية', status:'موقوف'},
  ];
  const clients = [
    {id:'c1', name:'متجر النور للأدوات المنزلية', phone:'01055556666', address:'شارع التحرير، الدقي', governorate:'الجيزة'},
    {id:'c2', name:'بوتيك سارة للأزياء', phone:'01066667777', address:'مدينة نصر، القاهرة', governorate:'القاهرة'},
    {id:'c3', name:'متجر التقنية الحديثة', phone:'01077778888', address:'سموحة، الإسكندرية', governorate:'الإسكندرية'},
  ];
  const users = [
    {id:'u1', name:'أحمد محمد', phone:'01000000001', password:'admin123', role:'admin'},
    {id:'u2', name:'محمد علي', phone:'01001234567', password:'rep123', role:'rep', repId:'r1'},
    {id:'u3', name:'سارة أحمد', phone:'01012345678', password:'rep123', role:'rep', repId:'r2'},
    {id:'u4', name:'متجر النور للأدوات المنزلية', phone:'01055556666', password:'client123', role:'client', clientId:'c1'},
  ];

  const receivers = [
    ['محمد سيد','01234567890','الحي السابع، مدينة نصر'],
    ['أمينة حسن','01298765432','فيصل، الجيزة'],
    ['كريم محمود','01187654321','رشدي، الإسكندرية'],
    ['سعيد أحمد','01276543210','ميدان الجمهورية، المنصورة'],
    ['إبراهيم طارق','01365432109','العجوزة، الجيزة'],
    ['مصطفى علي','01454321098','سيدي جابر، الإسكندرية'],
    ['نورهان علي','01543210987','شبرا، القاهرة'],
    ['هبة الله كمال','01632109876','المعادي، القاهرة'],
  ];
  const statusesPool = ['في الشحن','في مخزن الشحن','تم التسليم','تم التسليم','مؤجل','مرتجع','في الشحن','تم التسليم'];

  let shipments = [];
  let idc = 100000;
  for(let i=0;i<24;i++){
    idc += 1;
    const cl = clients[i % clients.length];
    const rv = receivers[i % receivers.length];
    const rep = reps[i % 3];
    const status = statusesPool[i % statusesPool.length];
    const daysAgo = i % 14;
    const created = new Date(Date.now() - daysAgo*86400000 - (i*3600000));
    const hist = [{status:'قيد المراجعة', date:new Date(created.getTime()-3600000).toISOString(), note:'تم إنشاء الشحنة'}];
    hist.push({status:'في مخزن الشحن', date:new Date(created.getTime()+3600000*2).toISOString(), note:'تم استلام الشحنة في المخزن'});
    if(status !== 'قيد المراجعة' && status !== 'في مخزن الشحن'){
      hist.push({status:'في الشحن', date:new Date(created.getTime()+3600000*6).toISOString(), note:'الشحنة مع المندوب في الطريق'});
    }
    if(status === 'تم التسليم'){ hist.push({status:'تم التسليم', date:new Date(created.getTime()+3600000*20).toISOString(), note:'تم تسليم الشحنة واستلام المبلغ'}); }
    if(status === 'مؤجل'){ hist.push({status:'مؤجل', date:new Date(created.getTime()+3600000*10).toISOString(), note:'العميل طلب التأجيل ليوم آخر'}); }
    if(status === 'مرتجع'){ hist.push({status:'مرتجع', date:new Date(created.getTime()+3600000*10).toISOString(), note:'رفض المستلم الشحنة'}); }

    shipments.push({
      id: String(idc),
      type: SHIP_TYPES[i % SHIP_TYPES.length],
      clientId: cl.id,
      senderName: cl.name, senderPhone: cl.phone, senderAddress: cl.address, senderGovernorate: cl.governorate,
      receiverName: rv[0], receiverPhone: rv[1], receiverAddress: rv[2], receiverGovernorate: cl.governorate,
      codAmount: 150 + (i*23 % 400), shippingFee: 35, pieces: 1 + (i%3), notes:'',
      repId: rep.id, status: status, createdDate: created.toISOString(), statusHistory: hist,
    });
  }
  save(DB.counter, idc);
  save(DB.reps, reps);
  save(DB.clients, clients);
  save(DB.users, users);
  save(DB.shipments, shipments);
  save(DB.seeded, true);
}

function computeStats(ships){
  const total = ships.length;
  const byStatus = {};
  STATUS_LIST.forEach(s=>byStatus[s]=0);
  let collected = 0, pendingCollect = 0;
  ships.forEach(sh=>{
    byStatus[sh.status] = (byStatus[sh.status]||0)+1;
    if(sh.status==='تم التسليم') collected += Number(sh.codAmount||0);
    else if(['في الشحن','في مخزن الشحن'].includes(sh.status)) pendingCollect += Number(sh.codAmount||0);
  });
  return {total, byStatus, collected, pendingCollect};
}

/* ============ SHIPMENTS LIST ============ */
const PAGE_SIZE = 8;

function setFilter(key, val){ state.filters[key]=val; state.page=1; render(); }

function filteredShipments(){
  let ships = visibleShipments();
  const f = state.filters;
  if(f.status) ships = ships.filter(s=>s.status===f.status);
  if(f.governorate) ships = ships.filter(s=>s.receiverGovernorate===f.governorate);
  if(f.from) ships = ships.filter(s=> new Date(s.createdDate) >= new Date(f.from));
  if(f.to) ships = ships.filter(s=> new Date(s.createdDate) <= new Date(f.to + 'T23:59:59'));
  if(f.q){
    const q = f.q.trim().toLowerCase();
    ships = ships.filter(s =>
      s.id.includes(q) || (s.receiverName||'').toLowerCase().includes(q) ||
      (s.senderName||'').toLowerCase().includes(q) || (s.receiverPhone||'').includes(q)
    );
  }
  return ships.sort((a,b)=> new Date(b.createdDate)-new Date(a.createdDate));
}

function renderShipmentsPage(){
  const session = getSession();
  const isAdmin = session.role === 'admin';
  const all = filteredShipments();
  const totalPages = Math.max(1, Math.ceil(all.length / PAGE_SIZE));
  state.page = Math.min(state.page, totalPages);
  const pageItems = all.slice((state.page-1)*PAGE_SIZE, state.page*PAGE_SIZE);

  const statusOpts = STATUS_LIST.map(s=>`<option value="${s}" ${state.filters.status===s?'selected':''}>${s}</option>`).join('');
  const govOpts = GOVS.map(g=>`<option value="${g}" ${state.filters.governorate===g?'selected':''}>${g}</option>`).join('');

  const rows = pageItems.map(sh => `
    <tr>
      <td>
        <div style="display:flex;gap:2px">
          <button class="icon-btn" title="تتبع" onclick="go('track',{trackId:'${sh.id}'})">👁️</button>
          ${isAdmin ? `<button class="icon-btn" title="تعديل" onclick="go('shipment-form',{editShipmentId:'${sh.id}'})">✏️</button>` : ''}
          ${isAdmin ? `<button class="icon-btn" title="حذف" onclick="deleteShipment('${sh.id}')">🗑️</button>` : ''}
          ${session.role==='rep' ? `<button class="icon-btn" title="تحديث الحالة" onclick="go('track',{trackId:'${sh.id}'})">🔄</button>` : ''}
        </div>
      </td>
      <td>${fmtMoney(sh.codAmount)}</td>
      <td>${statusPill(sh.status)}</td>
      <td>${repName(sh.repId)}</td>
      <td>${sh.receiverGovernorate}</td>
      <td>${sh.receiverName}</td>
      <td>${fmtDate(sh.createdDate)}</td>
      <td class="mono">#${sh.id}</td>
    </tr>`).join('');

  const pageBtns = [];
  for(let i=1;i<=totalPages;i++){ pageBtns.push(`<button class="page-btn ${i===state.page?'active':''}" onclick="state.page=${i};render()">${i}</button>`); }

  return `
  <div class="card">
    <div class="card-pad" style="padding-bottom:0">
      <div class="toolbar">
        <input class="search-input" placeholder="بحث برقم الشحنة، اسم العميل، المستلم..." value="${state.filters.q}" oninput="setFilter('q', this.value)">
        <select onchange="setFilter('status', this.value)"><option value="">كل الحالات</option>${statusOpts}</select>
        <select onchange="setFilter('governorate', this.value)"><option value="">كل المحافظات</option>${govOpts}</select>
        <input type="date" value="${state.filters.from}" onchange="setFilter('from', this.value)">
        <input type="date" value="${state.filters.to}" onchange="setFilter('to', this.value)">
        ${isAdmin ? `<button class="btn btn-primary btn-sm" onclick="go('shipment-form')">➕ إضافة شحنة</button>` : ''}
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>الإجراءات</th><th>القيمة</th><th>الحالة</th><th>المندوب</th><th>المحافظة</th><th>المستلم</th><th>تاريخ الإنشاء</th><th>رقم الشحنة</th></tr></thead>
        <tbody>${rows || `<tr><td colspan="8"><div class="empty-state"><div class="big">📭</div>لا توجد شحنات مطابقة</div></td></tr>`}</tbody>
      </table>
    </div>
    <div class="pagination">
      <span class="small text-muted" style="margin-left:10px">عرض ${pageItems.length} من ${all.length} شحنة</span>
      ${pageBtns.join('')}
    </div>
  </div>`;
}

function selectChip(el, hiddenId){
  const parent = el.parentElement;
  [...parent.children].forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
  document.getElementById('f-'+hiddenId).value = el.dataset.type;
}
function fillClientFields(clientId){
  const c = clientById(clientId);
  if(!c) return;
  document.getElementById('f-sname').value = c.name;
  document.getElementById('f-sphone').value = c.phone;
  document.getElementById('f-saddress').value = c.address;
  document.getElementById('f-sgov').value = c.governorate;
}

function submitShipmentForm(e){
  e.preventDefault();
  const session = getSession();
  const editId = state.editShipmentId;
  const val = id => document.getElementById(id).value;

  const payload = {
    type: val('f-type'),
    pieces: Number(val('f-pieces'))||1,
    codAmount: Number(val('f-cod'))||0,
    shippingFee: Number(val('f-fee'))||0,
    repId: session.role==='admin' ? (document.getElementById('f-rep')?.value || '') : undefined,
    notes: val('f-notes'),
    clientId: val('f-client'),
    senderName: val('f-sname'), senderPhone: val('f-sphone'), senderAddress: val('f-saddress'), senderGovernorate: val('f-sgov'),
    receiverName: val('f-rname'), receiverPhone: val('f-rphone'), receiverAddress: val('f-raddress'), receiverGovernorate: val('f-rgov'),
  };
  if(payload.repId === undefined) delete payload.repId;

  if(!payload.receiverName || !payload.receiverPhone || !payload.receiverAddress){
    showToast('من فضلك أكمل بيانات المستلم');
    return;
  }

  if(editId){
    updateShipment(editId, payload);
    showToast('تم حفظ التعديلات بنجاح');
  } else {
    const id = nextShipmentId();
    const ships = allShipments();
    ships.push({
      id, ...payload,
      status: 'قيد المراجعة',
      createdDate: new Date().toISOString(),
      statusHistory: [{status:'قيد المراجعة', date:new Date().toISOString(), note:'تم إنشاء الشحنة'}],
    });
    save(DB.shipments, ships);
    showToast('تم إضافة الشحنة رقم #' + id);
  }
  state.editShipmentId = null;
  go('shipments');
}

      <td style="font-weight:700">${r.name}</td>
    </tr>`).join('');
  return `
  <div class="card card-pad" style="margin-bottom:16px"><div class="flex-between" style="margin-bottom:12px"><h3 style="margin:0;font-size:15px">خريطة مواقع المندوبين</h3><span class="small text-muted">محاكاة آخر موقع مسجل</span></div>${repLocationMap()}</div>
  <div class="card">
    <div class="card-head"><h3>المندوبين (${reps.length})</h3><button class="btn btn-primary btn-sm" onclick="go('rep-form')">➕ إضافة مندوب</button></div>
    <div class="table-wrap"><table>
      <thead><tr><th>الإجراءات</th><th>عدد الشحنات</th><th>آخر تحديث</th><th>آخر موقع</th><th>الحالة</th><th>المحافظة</th><th>الهاتف</th><th>الاسم</th></tr></thead>
      <tbody>${rows || `<tr><td colspan="8"><div class="empty-state">لا يوجد مندوبين</div></td></tr>`}</tbody>
    </table></div>
  </div>`;
}
function deleteRep(id){
  if(!confirm('حذف هذا المندوب؟')) return;
  save(DB.reps, allReps().filter(r=>r.id!==id));
  showToast('تم حذف المندوب'); render();
}
function renderRepForm(){
  const editing = state.editRepId ? repById(state.editRepId) : null;
  return `
  <form class="card card-pad" style="max-width:560px" onsubmit="submitRepForm(event)">
    <div class="form-section-title">${editing?'تعديل بيانات المندوب':'إضافة مندوب جديد'}</div>
    <div class="field"><label>الاسم</label><input id="rf-name" value="${editing?editing.name:''}" required></div>
    <div class="field"><label>رقم الهاتف</label><input id="rf-phone" value="${editing?editing.phone:''}" required></div>
    <div class="field"><label>محافظة العمل</label><select id="rf-gov">${GOVS.map(g=>`<option ${editing&&editing.governorate===g?'selected':''}>${g}</option>`).join('')}</select></div>
    <div class="field"><label>الحالة</label><select id="rf-status"><option ${editing&&editing.status==='نشط'?'selected':''}>نشط</option><option ${editing&&editing.status==='موقوف'?'selected':''}>موقوف</option></select></div>
    <div style="display:flex;gap:10px;margin-top:6px">
      <button class="btn btn-primary" type="submit">💾 حفظ</button>
      <button class="btn btn-outline" type="button" onclick="go('reps')">إلغاء</button>
    </div>
  </form>`;
}
function submitRepForm(e){
  e.preventDefault();
  const val = id=>document.getElementById(id).value;
  const payload = {name:val('rf-name'), phone:val('rf-phone'), governorate:val('rf-gov'), status:val('rf-status')};
  const reps = allReps();
  if(state.editRepId){
    const idx = reps.findIndex(r=>r.id===state.editRepId);
    reps[idx] = {...reps[idx], ...payload};
    showToast('تم حفظ التعديلات');
  } else {
    reps.push({id: uid('r'), ...payload});
    showToast('تم إضافة المندوب');
  }
  save(DB.reps, reps);
  state.editRepId = null;
  go('reps');
}

/* ============ RETURNS (admin) ============ */
function renderReturnsPage(){
  const returns = allShipments().filter(s=>['مرتجع','تم استلام المرتجع','في مخزن المرتجعات','في الشحن للمرسل'].includes(s.status));
  const rows = returns.map(sh => `
    <tr>
      <td><button class="icon-btn" onclick="go('track',{trackId:'${sh.id}'})">👁️</button></td>
      <td>${fmtMoney(sh.codAmount)}</td>
      <td>${statusPill(sh.status)}</td>
      <td>${repName(sh.repId)}</td>
      <td>${sh.senderName}</td>
      <td>${sh.receiverName}</td>
      <td class="mono">#${sh.id}</td>
    </tr>`).join('');
  return `
  <div class="card">
    <div class="card-head"><h3>المرتجعات (${returns.length})</h3></div>
    <div class="table-wrap"><table>
      <thead><tr><th>عرض</th><th>القيمة</th><th>الحالة</th><th>المندوب</th><th>المرسل</th><th>المستلم</th><th>رقم الشحنة</th></tr></thead>
      <tbody>${rows || `<tr><td colspan="7"><div class="empty-state"><div class="big">📭</div>لا توجد مرتجعات حالياً</div></td></tr>`}</tbody>
    </table></div>
  </div>`;
}

/* ============ COLLECTIONS ============ */
function renderCollectionsPage(){
  const session = getSession();
  const ships = visibleShipments();
  const delivered = ships.filter(s=>s.status==='تم التسليم');
  const pending = ships.filter(s=>['في الشحن','في مخزن الشحن'].includes(s.status));
  const totalCollected = delivered.reduce((a,s)=>a+Number(s.codAmount||0),0);
  const totalPending = pending.reduce((a,s)=>a+Number(s.codAmount||0),0);

  let byRepHtml = '';
  if(session.role==='admin'){
    const reps = allReps();
    const rows = reps.map(r=>{
      const rs = allShipments().filter(s=>s.repId===r.id && s.status==='تم التسليم');
      const sum = rs.reduce((a,s)=>a+Number(s.codAmount||0),0);
      return {name:r.name, count:rs.length, sum};
    }).filter(x=>x.count>0).sort((a,b)=>b.sum-a.sum);
    byRepHtml = `
    <div class="card" style="margin-top:16px">
      <div class="card-head"><h3>التحصيلات حسب المندوب</h3></div>
      <div class="table-wrap"><table>
        <thead><tr><th>إجمالي المحصّل</th><th>عدد الشحنات</th><th>المندوب</th></tr></thead>
        <tbody>${rows.map(r=>`<tr><td style="font-weight:700">${fmtMoney(r.sum)}</td><td>${r.count}</td><td>${r.name}</td></tr>`).join('') || `<tr><td colspan="3"><div class="empty-state">لا توجد بيانات</div></td></tr>`}</tbody>
      </table></div>
    </div>`;
  }

  const rows = delivered.slice(0,10).map(sh=>`
    <tr><td>${fmtDate(sh.createdDate)}</td><td>${fmtMoney(sh.codAmount)}</td><td>${sh.receiverName}</td><td class="mono">#${sh.id}</td></tr>`).join('');

  return `
  <div class="grid grid-3" style="margin-bottom:16px">
    ${statCard('💰', fmtMoney(totalCollected), 'إجمالي المحصّل', '#16a34a', '#e8f8ee')}
    ${statCard('⏳', fmtMoney(totalPending), 'قيد التحصيل', '#e08a00', '#fdf1de')}
    ${statCard('📦', delivered.length, 'شحنات تم تحصيلها', '#2952e3', '#e9f0fe')}
  </div>
  <div class="card">
    <div class="card-head"><h3>آخر التحصيلات</h3></div>
    <div class="table-wrap"><table>
      <thead><tr><th>التاريخ</th><th>القيمة</th><th>المستلم</th><th>رقم الشحنة</th></tr></thead>
      <tbody>${rows || `<tr><td colspan="4"><div class="empty-state">لا توجد تحصيلات بعد</div></td></tr>`}</tbody>
    </table></div>
  </div>
  ${byRepHtml}`;
}

/* ============ REPORTS (admin, with charts) ============ */
let chartInstances = [];
function destroyCharts(){ chartInstances.forEach(c=>c.destroy()); chartInstances=[]; }

function renderReportsPage(){
  ensureRepLocations();
  const ships = smartFilteredReportShipments();
  const st = computeStats(ships);
  const deliveryRate = pct(st.byStatus['تم التسليم'], st.total);
  const returnRate = pct(st.byStatus['مرتجع'], st.total);
  const postponeRate = pct(st.byStatus['مؤجل'], st.total);
  const clients = allClients(); const reps = allReps(); const f = state.reportFilters;
  const clientOpts = clients.map(c=>`<option value="${c.id}" ${f.clientId===c.id?'selected':''}>${c.name}</option>`).join('');
  const repOpts = reps.map(r=>`<option value="${r.id}" ${f.repId===r.id?'selected':''}>${r.name}</option>`).join('');
  const govOpts = GOVS.map(g=>`<option value="${g}" ${f.governorate===g?'selected':''}>${g}</option>`).join('');
  const statusOpts = STATUS_LIST.map(s=>`<option value="${s}" ${f.status===s?'selected':''}>${s}</option>`).join('');
  const topGov = topItem(groupCount(ships,'receiverGovernorate'));
  const topClient = (clientById(topItem(groupCount(ships,'clientId'))) || {}).name || '—';
  return `
  <div class="card card-pad" style="margin-bottom:16px">
    <div class="flex-between" style="margin-bottom:12px;gap:10px;flex-wrap:wrap"><div><h3 style="margin:0;font-size:16px">التقارير الذكية</h3><div class="small text-muted">اختار المدة وأكثر من فلتر وسيتم تحديث كل المؤشرات والرسوم تلقائيا.</div></div><button class="btn btn-outline btn-sm" onclick="state.reportFilters={range:'30',from:'',to:'',clientId:'',repId:'',governorate:'',status:''};render()">🔄 إعادة ضبط</button></div>
    <div class="smart-filters"><select onchange="setReportFilter('range',this.value)"><option value="7" ${f.range==='7'?'selected':''}>آخر 7 أيام</option><option value="30" ${f.range==='30'?'selected':''}>آخر 30 يوم</option><option value="90" ${f.range==='90'?'selected':''}>آخر 90 يوم</option><option value="all" ${f.range==='all'?'selected':''}>كل الفترة</option><option value="custom" ${f.range==='custom'?'selected':''}>مدة مخصصة</option></select><input type="date" value="${f.from}" onchange="state.reportFilters.range='custom';setReportFilter('from',this.value)"><input type="date" value="${f.to}" onchange="state.reportFilters.range='custom';setReportFilter('to',this.value)"><select onchange="setReportFilter('clientId',this.value)"><option value="">كل العملاء</option>${clientOpts}</select><select onchange="setReportFilter('repId',this.value)"><option value="">كل المندوبين</option>${repOpts}</select><select onchange="setReportFilter('governorate',this.value)"><option value="">كل المحافظات</option>${govOpts}</select><select onchange="setReportFilter('status',this.value)"><option value="">كل الحالات</option>${statusOpts}</select></div>
  </div>
  <div class="grid grid-4" style="margin-bottom:16px">${statCard('📦', st.total, 'الشحنات بعد الفلترة', '#2952e3', '#e9f0fe')}${statCard('✅', deliveryRate + '%', 'نسبة التسليم', '#16a34a', '#e8f8ee')}${statCard('↩️', returnRate + '%', 'نسبة المرتجع', '#e6473f', '#fdeceb')}${statCard('💰', fmtMoney(st.collected), 'إجمالي المحصل', '#e08a00', '#fdf1de')}</div>
  <div class="two-col" style="margin-bottom:16px"><div class="card card-pad"><h3 style="margin:0 0 14px;font-size:14px">مؤشر جودة التشغيل</h3><div class="grid grid-3"><div style="text-align:center"><div class="score-ring" style="--score:${deliveryRate}"><span>${deliveryRate}%</span></div><div class="small text-muted" style="margin-top:8px">تسليم</div></div><div class="insight-list"><div class="insight-item"><div class="insight-icon" style="background:#e9f0fe;color:#2952e3">📍</div><div><div class="insight-title">${topGov}</div><div class="insight-note">أعلى محافظة</div></div></div><div class="insight-item"><div class="insight-icon" style="background:#efe9fe;color:#7c5cf0">🏬</div><div><div class="insight-title">${topClient}</div><div class="insight-note">أعلى عميل نشاطا</div></div></div></div><div class="insight-list"><div class="insight-item"><div class="insight-icon" style="background:#fdf1de;color:#e08a00">⏱️</div><div><div class="insight-title">${postponeRate}%</div><div class="insight-note">نسبة التأجيل</div></div></div><div class="insight-item"><div class="insight-icon" style="background:#fdeceb;color:#e6473f">↩️</div><div><div class="insight-title">${st.byStatus['مرتجع']}</div><div class="insight-note">مرتجع بعد الفلترة</div></div></div></div></div></div><div class="card card-pad"><h3 style="margin:0 0 14px;font-size:14px">توزيع الشحنات حسب الحالة</h3><canvas id="chart-donut" height="180"></canvas></div></div>
  <div class="two-col" style="margin-bottom:16px"><div class="card card-pad"><h3 style="margin:0 0 14px;font-size:14px">اتجاه الشحنات حسب المدة المختارة</h3><canvas id="chart-line" height="115"></canvas></div><div class="card card-pad"><h3 style="margin:0 0 14px;font-size:14px">أعلى المحافظات</h3><canvas id="chart-bar" height="180"></canvas></div></div>
  <div class="two-col"><div class="card"><div class="card-head"><h3>أداء المندوبين الذكي</h3></div><div class="table-wrap"><table><thead><tr><th>نسبة التسليم</th><th>مرتجع</th><th>تم التسليم</th><th>إجمالي</th><th>المندوب</th></tr></thead><tbody>${smartRepsRows(ships)}</tbody></table></div></div><div class="card"><div class="card-head"><h3>أداء العملاء</h3></div><div class="table-wrap"><table><thead><tr><th>نسبة التسليم</th><th>مرتجع</th><th>إجمالي</th><th>العميل</th></tr></thead><tbody>${smartClientsRows(ships)}</tbody></table></div></div></div>`;
}
function topRepsRows(){
  const reps = allReps();
  const rows = reps.map(r=>{
    const rs = allShipments().filter(s=>s.repId===r.id);
    const sum = rs.filter(s=>s.status==='تم التسليم').reduce((a,s)=>a+Number(s.codAmount||0),0);
    return {name:r.name, count:rs.length, sum};
  }).sort((a,b)=>b.sum-a.sum).slice(0,6);
  return rows.map(r=>`<tr><td style="font-weight:700">${fmtMoney(r.sum)}</td><td>${r.count}</td><td>${r.name}</td></tr>`).join('') || `<tr><td colspan="3"><div class="empty-state">لا توجد بيانات</div></td></tr>`;
}


function smartRepsRows(ships){
  const rows = allReps().map(r=>{ const rs=ships.filter(s=>s.repId===r.id); const delivered=rs.filter(s=>s.status==='تم التسليم').length; const returned=rs.filter(s=>s.status==='مرتجع').length; return {name:r.name,total:rs.length,delivered,returned,rate:pct(delivered,rs.length)}; }).filter(x=>x.total>0).sort((a,b)=>b.rate-a.rate || b.total-a.total).slice(0,8);
  return rows.map(r=>`<tr><td><b>${r.rate}%</b></td><td>${r.returned}</td><td>${r.delivered}</td><td>${r.total}</td><td style="font-weight:800">${r.name}</td></tr>`).join('') || `<tr><td colspan="5"><div class="empty-state">لا توجد بيانات مطابقة</div></td></tr>`;
}
function smartClientsRows(ships){
  const rows = allClients().map(c=>{ const cs=ships.filter(s=>s.clientId===c.id); const delivered=cs.filter(s=>s.status==='تم التسليم').length; const returned=cs.filter(s=>s.status==='مرتجع').length; return {name:c.name,total:cs.length,returned,rate:pct(delivered,cs.length)}; }).filter(x=>x.total>0).sort((a,b)=>b.total-a.total).slice(0,8);
  return rows.map(r=>`<tr><td><b>${r.rate}%</b></td><td>${r.returned}</td><td>${r.total}</td><td style="font-weight:800">${r.name}</td></tr>`).join('') || `<tr><td colspan="4"><div class="empty-state">لا توجد بيانات مطابقة</div></td></tr>`;
}

function drawReportsCharts(){
  if(typeof Chart === 'undefined') return;
  destroyCharts();
  const ships = smartFilteredReportShipments();
  const f = state.reportFilters || {};
  const daysWindow = f.range==='7'?7:f.range==='90'?90:30;
  const useDaily = f.range !== 'all';
  const days = [];
  if(useDaily){ for(let i=daysWindow-1;i>=0;i--){ days.push(new Date(Date.now()-i*86400000)); } }
  const labels = useDaily ? days.map(d=>d.toLocaleDateString('ar-EG',{day:'numeric',month:'short'})) : ['كل الفترة'];
  const counts = useDaily ? days.map(d => ships.filter(s=>new Date(s.createdDate).toDateString() === d.toDateString()).length) : [ships.length];
  const lineEl = document.getElementById('chart-line');
  if(lineEl){ chartInstances.push(new Chart(lineEl, {type:'line',data:{labels,datasets:[{label:'شحنات',data:counts,borderColor:'#2952e3',backgroundColor:'rgba(41,82,227,.08)',tension:.35,fill:true,pointRadius:2}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{precision:0}}}}})); }
  const st = computeStats(ships);
  const statusLabels = STATUS_LIST.filter(s=>st.byStatus[s]>0);
  const donutEl = document.getElementById('chart-donut');
  if(donutEl){ chartInstances.push(new Chart(donutEl, {type:'doughnut',data:{labels:statusLabels,datasets:[{data:statusLabels.map(l=>st.byStatus[l]),backgroundColor:statusLabels.map(l=>STATUS_META[l].color)}]},options:{plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{family:'Cairo',size:11}}}}}})); }
  const govSorted = groupCount(ships,'receiverGovernorate').sort((a,b)=>b[1]-a[1]).slice(0,6);
  const barEl = document.getElementById('chart-bar');
  if(barEl){ chartInstances.push(new Chart(barEl, {type:'bar',data:{labels:govSorted.map(x=>x[0]),datasets:[{data:govSorted.map(x=>x[1]),backgroundColor:'#7c5cf0',borderRadius:6}]},options:{indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,ticks:{precision:0}}}}})); }
}


function toggleMobileMenu(){ document.body.classList.toggle('mobile-nav-open'); }
function closeMobileMenu(){ document.body.classList.remove('mobile-nav-open'); }
function enhanceMobileTables(){
  document.querySelectorAll('table').forEach(table=>{
    const headers=[...table.querySelectorAll('thead th')].map(th=>th.textContent.trim());
    table.querySelectorAll('tbody tr').forEach(tr=>{ [...tr.children].forEach((td,i)=>{ if(!td.getAttribute('data-label')) td.setAttribute('data-label', headers[i] || ''); }); });
  });
}

/* ============ MAIN RENDER DISPATCHER ============ */
function pageContent(){
  const session = getSession();
  switch(state.view){
    case 'dashboard': return renderDashboard();
    case 'shipments': return renderShipmentsPage();
    case 'shipment-form': return renderShipmentForm();
    case 'track': return renderTrackPage();
    case 'clients': return session.role==='admin' ? renderClientsPage() : renderDashboard();
    case 'client-form': return session.role==='admin' ? renderClientForm() : renderDashboard();
    case 'reps': return session.role==='admin' ? renderRepsPage() : renderDashboard();
    case 'rep-form': return session.role==='admin' ? renderRepForm() : renderDashboard();
    case 'returns': return session.role==='admin' ? renderReturnsPage() : renderDashboard();
    case 'collections': return renderCollectionsPage();
    case 'reports': return session.role==='admin' ? renderReportsPage() : renderDashboard();
    default: return renderDashboard();
  }
}

function render(){
  const app = document.getElementById('app');
  const session = getSession();
  if(!session){
    state.view = 'login';
    app.innerHTML = renderLogin();
    return;
  }
  if(state.view === 'login') state.view = 'dashboard';
  app.innerHTML = renderLayout(pageContent());
  enhanceMobileTables();
  if(state.view === 'reports' && session.role==='admin'){
    setTimeout(drawReportsCharts, 0);
  }
}

// Initial boot
render();

</script>
</body>
</html>
